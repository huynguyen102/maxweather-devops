apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: maxweather
  labels:
    app: maxweather
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: maxweather
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # Scale out when average CPU across pods exceeds 60% of the request.
          averageUtilization: 60
