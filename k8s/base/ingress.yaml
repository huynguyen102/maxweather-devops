apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: maxweather
  labels:
    app: maxweather
spec:
  # Routes through the Nginx Ingress Controller (see k8s/platform/ingress-nginx.md),
  # which is fronted by an AWS NLB. API Gateway proxies to that NLB.
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: maxweather
                port:
                  number: 80
